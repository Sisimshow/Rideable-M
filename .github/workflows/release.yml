name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        # Strips a leading 'v' if present: v1.6.1 → 1.6.1, 1.6.1 → 1.6.1
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update module.json
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          MODULE_ID=$(jq -r '.id' module.json)
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${MODULE_ID}-${VERSION}.zip"
          MANIFEST_URL="https://github.com/${{ github.repository }}/releases/latest/download/module.json"
          jq --arg v "$VERSION" --arg d "$DOWNLOAD_URL" --arg m "$MANIFEST_URL" \
            '.version = $v | .download = $d | .manifest = $m' \
            module.json > _module.json
          mv _module.json module.json

      - name: Create release zip
        id: zip
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          MODULE_ID=$(jq -r '.id' module.json)
          ZIP_NAME="${MODULE_ID}-${VERSION}.zip"
          mkdir -p "$MODULE_ID"
          # Allowlist: only these paths are bundled into the release zip.
          # ".github/", ".claude/", and Rideable.lock are intentionally excluded.
          cp -r module.json README.md LICENSE lang/ packs/ scripts/ "$MODULE_ID/"
          zip -r "$ZIP_NAME" "$MODULE_ID/"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.zip.outputs.ZIP_NAME }}
            module.json
